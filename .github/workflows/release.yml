name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    name: Build (Linux x86_64 GNU)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libasound2-dev \
            libwayland-dev \
            libxkbcommon-dev \
            libdbus-1-dev \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: linux-x86_64

      - name: Build
        run: cargo build --release --target x86_64-unknown-linux-gnu

      - name: Package
        run: |
          RELEASE="target/x86_64-unknown-linux-gnu/release"
          PKG_DIR="fivetris-${{ github.ref_name }}-linux-x86_64"
          mkdir -p "$PKG_DIR"
          cp "$RELEASE/fivetris" "$RELEASE/"*.desktop "$RELEASE/"*.png "$RELEASE/"*.sh "$PKG_DIR/"
          tar czf "$PKG_DIR.tar.gz" "$PKG_DIR"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: fivetris-${{ github.ref_name }}-linux-x86_64.tar.gz

  build-windows:
    name: Build (Windows x86_64 MinGW)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install MinGW cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc-mingw-w64-x86-64 \
            pkg-config

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-gnu

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: windows-x86_64

      - name: Configure cross-compilation
        run: |
          mkdir -p ~/.cargo
          cat >> ~/.cargo/config.toml <<'EOF'
          [target.x86_64-pc-windows-gnu]
          linker = "x86_64-w64-mingw32-gcc"
          EOF

      - name: Build
        run: cargo build --release --target x86_64-pc-windows-gnu

      - name: Package
        run: |
          cp target/x86_64-pc-windows-gnu/release/fivetris.exe fivetris.exe
          zip fivetris-${{ github.ref_name }}-windows-x86_64.zip fivetris.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: fivetris-${{ github.ref_name }}-windows-x86_64.zip

  build-macos:
    name: Build (macOS Universal)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin, aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: macos-universal

      - name: Build x86_64
        run: cargo build --release --target x86_64-apple-darwin

      - name: Build arm64
        run: cargo build --release --target aarch64-apple-darwin

      - name: Create universal binary & bundle
        run: |
          lipo -create \
            target/x86_64-apple-darwin/release/fivetris \
            target/aarch64-apple-darwin/release/fivetris \
            -output target/aarch64-apple-darwin/release/fivetris.app/Contents/MacOS/fivetris

      - name: Package DMG
        run: |
          hdiutil create \
            -volname "Fivetris ${{ github.ref_name }}" \
            -srcFolder target/aarch64-apple-darwin/release/fivetris.app \
            -ov -format UDZO \
            fivetris-${{ github.ref_name }}-macos-universal.dmg

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: fivetris-${{ github.ref_name }}-macos-universal.dmg

  release:
    name: Create GitHub Release
    needs: [build-linux, build-windows, build-macos]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            linux-x86_64/fivetris-${{ github.ref_name }}-linux-x86_64.tar.gz
            windows-x86_64/fivetris-${{ github.ref_name }}-windows-x86_64.zip
            macos-universal/fivetris-${{ github.ref_name }}-macos-universal.dmg
          generate_release_notes: true
