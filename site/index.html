<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fivetris</title>
  <link rel="icon" href="icon.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header>
    <img src="icon.png" alt="" class="logo">
    <h1>Fivetris</h1>
    <p class="subtitle">A simple Tetris trainer</p>
  </header>

  <main>
    <section class="hero">
      <img src="screenshot.png" alt="Screenshot" class="screenshot">
      <div class="download">
        <a class="btn" href="https://github.com/relativemodder/fivetris/releases/latest">Download</a>
        <span class="os">Linux &middot; Windows</span>
      </div>
    </section>

    <section class="info">
      <p>
        A Rust rewrite of <a href="https://github.com/fiorescarlatto/four-tris">four-tris</a>,
        an open source training tool for block-stacking games.
        Built for quickly exploring situations, testing options, and training freely.
      </p>
    </section>

    <footer>
      <a href="https://github.com/relativemodder/fivetris">GitHub</a>
    </footer>
  </main>
</body>
</html>
